<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f766e" />
    <meta
      name="description"
      content="喝口水是一款用于喝水提醒与饮水记录的轻量 demo。"
    />
    <title>喝口水</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./assets/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css?v=3" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar" aria-label="应用顶部栏">
        <a class="brand" href="#" aria-label="喝口水首页">
          <span class="brand-mark" aria-hidden="true">
            <span class="brand-drop"></span>
          </span>
          <span>
            <strong>喝口水</strong>
            <span>今天也慢慢补上</span>
          </span>
        </a>
        <div class="topbar-actions">
          <button class="icon-button" id="exportData" type="button" title="导出记录" aria-label="导出记录">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3v12m0 0 4-4m-4 4-4-4" />
              <path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2" />
            </svg>
          </button>
          <button class="icon-button" id="resetDay" type="button" title="清空今日" aria-label="清空今日">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 6h18" />
              <path d="M8 6V4h8v2" />
              <path d="m19 6-1 14H6L5 6" />
              <path d="M10 11v5m4-5v5" />
            </svg>
          </button>
        </div>
      </header>

      <main class="workspace">
        <section class="hero-panel" aria-labelledby="todayTitle">
          <div class="hero-copy">
            <p class="eyebrow" id="todayDate"></p>
            <h1 id="todayTitle">今天喝了 <span id="todayAmount">0</span> ml</h1>
            <div class="progress-line" aria-label="今日进度">
              <span id="progressText">目标 0%</span>
              <span id="remainingText">还差 0 ml</span>
            </div>
            <div class="progress-track">
              <span id="progressFill"></span>
            </div>
          </div>

          <div class="water-stage" aria-label="今日饮水进度可视化">
            <canvas id="waterCanvas" width="360" height="360"></canvas>
            <div class="water-metrics">
              <strong id="goalText">2000 ml</strong>
              <span>今日目标</span>
            </div>
          </div>
        </section>

        <section class="control-grid" aria-label="饮水记录与提醒控制">
          <div class="panel log-panel">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">记录</p>
                <h2>刚刚喝了多少？</h2>
              </div>
              <button class="ghost-button" id="undoEntry" type="button">撤销</button>
            </div>

            <div class="quick-grid" id="quickAmounts" aria-label="快速记录饮水量"></div>

            <form class="custom-add" id="customForm" novalidate>
              <label for="customAmount">自定义</label>
              <div class="input-row">
                <input
                  id="customAmount"
                  name="customAmount"
                  type="number"
                  inputmode="numeric"
                  min="1"
                  max="2000"
                  step="1"
                  placeholder="150"
                />
                <span>ml</span>
                <button type="submit">加入</button>
              </div>
            </form>

            <ol class="timeline" id="timeline" aria-label="今日饮水记录"></ol>
          </div>

          <div class="panel settings-panel">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">提醒</p>
                <h2>下一次补水</h2>
              </div>
              <label class="switch" for="reminderToggle">
                <input id="reminderToggle" type="checkbox" />
                <span></span>
              </label>
            </div>

            <div class="reminder-status" id="reminderStatus">提醒未开启</div>

            <div class="form-grid">
              <label>
                每隔
                <select id="intervalMinutes">
                  <option value="30">30 分钟</option>
                  <option value="45">45 分钟</option>
                  <option value="60">60 分钟</option>
                  <option value="90">90 分钟</option>
                  <option value="120">120 分钟</option>
                </select>
              </label>
              <label>
                目标
                <input id="dailyGoal" type="number" min="500" max="6000" step="100" />
              </label>
              <label>
                周目标
                <input id="weeklyGoal" type="number" min="1000" max="42000" step="100" />
              </label>
              <label>
                开始
                <input id="wakeStart" type="time" />
              </label>
              <label>
                结束
                <input id="wakeEnd" type="time" />
              </label>
            </div>

            <button class="primary-button" id="saveSettings" type="button">保存设置</button>
          </div>
        </section>

        <section class="stats-grid" aria-label="饮水统计">
          <article class="stat-card">
            <span>连续达标</span>
            <strong id="streakDays">0 天</strong>
          </article>
          <article class="stat-card">
            <span>7 日平均</span>
            <strong id="weeklyAverage">0 ml</strong>
          </article>
          <article class="stat-card">
            <span>今日次数</span>
            <strong id="entryCount">0 次</strong>
          </article>
        </section>

        <section class="panel reward-panel" aria-labelledby="rewardTitle">
          <div class="reward-copy">
            <p class="eyebrow">周日奖励</p>
            <h2 id="rewardTitle">本周喝够水，周日就喝一杯奶茶</h2>
            <p id="rewardStatus">本周还没有开始记录</p>
          </div>
          <div class="reward-meter" aria-label="本周奶茶奖励进度">
            <strong id="weeklyTotal">0 ml</strong>
            <span id="weeklyRewardGoal">目标 14,000 ml</span>
            <div class="mini-track">
              <span id="rewardFill"></span>
            </div>
          </div>
        </section>

        <section class="panel chart-panel" aria-labelledby="chartTitle">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">趋势</p>
              <h2 id="chartTitle">最近 7 天</h2>
            </div>
            <span class="chart-goal" id="chartGoal">目标线 2000 ml</span>
          </div>
          <div class="bar-chart" id="weeklyChart" aria-label="最近 7 天饮水量柱状图"></div>
        </section>
      </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <template id="entryTemplate">
      <li>
        <span class="entry-dot"></span>
        <time></time>
        <strong></strong>
      </li>
    </template>

    <script src="./app.js?v=3" type="module"></script>
  </body>
</html>
